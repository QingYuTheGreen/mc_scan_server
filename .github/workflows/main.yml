name: Build Flet EXE & APK

# 触发时机：推送到 main 分支时执行
on:
  push:
    branches: [ main ]

jobs:
  # 任务1：打包 Windows EXE
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller flet

      - name: Package to EXE
        run: |
          pyinstaller --onefile --windowed main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE
          path: dist/

  # 任务2：打包 Android APK
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet buildozer

      - name: Prepare Buildozer config
        run: |
          # 生成默认 buildozer.spec 配置文件
          buildozer init
          # 基础配置修改（可选，按需调整）
          sed -i 's/title = .*/title = FletApp/' buildozer.spec
          sed -i 's/package.name = .*/package.name = fletapp/' buildozer.spec
          sed -i 's/package.domain = .*/package.domain = org.flet.app/' buildozer.spec

      - name: Build Release APK
        run: |
          buildozer android debug deploy run release
          # 输出路径：bin/ 目录下就是 APK

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/

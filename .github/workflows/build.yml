name: Build Flet APK & Windows EXE
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 支持手动点击构建

env:
  PYTHON_VERSION: "3.11"
  FLUTTER_VERSION: "3.24.5"
  FLET_NO_RICH: 1

jobs:
  # 并行两个构建任务：APK / Windows EXE
  build-multi:
    strategy:
      fail-fast: false # 一个失败不终止另一个
      matrix:
        config:
          - name: apk
            runs-on: ubuntu-latest
            build_cmd: flet build apk
            artifact_dir: build/apk
            artifact_name: android-apk
          - name: windows
            runs-on: windows-latest
            build_cmd: flet build windows
            artifact_dir: build/windows
            artifact_name: windows-exe

    runs-on: ${{ matrix.config.runs-on }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      # ========== 通用Python环境 ==========
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 安装Flet CLI
        run: |
          pip install --upgrade pip
          pip install flet flet-cli

      # ========== Flutter 全平台安装 ==========
      - name: 配置Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ========== APK额外依赖（仅Ubuntu执行） ==========
      - name: 安装Android构建依赖
        if: matrix.config.name == 'apk'
        run: |
          # JDK17
          sudo apt update
          sudo apt install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          # Android许可
          flutter config --no-analytics
          flutter doctor --android-licenses -y

      # ========== 执行打包 ==========
      - name: 构建 ${{ matrix.config.name }}
        run: ${{ matrix.config.build_cmd }} --verbose

      # ========== 上传制品到Actions缓存 ==========
      - name: 上传构建文件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact_name }}
          path: ${{ matrix.config.artifact_dir }}
          retention-days: 30
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt update -qq
          sudo apt install -y openjdk-17-jdk android-sdk build-essential yes --no-install-recommends

      - name: Cache Android build files
        uses: actions/cache@v3
        with:
          path: |
            ~/.flet
            ~/.gradle
          key: ${{ runner.os }}-flet-android-${{ github.sha }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet

      # 关键：用 yes 命令自动确认所有交互提示
      - name: Build Android APK
        run: |
          yes | flet build apk --verbose --output build/Android

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: build/Android/

name: Build Flet EXE & APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller flet

      # 改用 pyinstaller 打包，稳定兼容
      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed main.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE
          path: dist/

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt update -qq
          sudo apt install -y openjdk-17-jdk android-sdk build-essential yes --no-install-recommends

      - name: Cache Android build files
        uses: actions/cache@v3
        with:
          path: |
            ~/.flet
            ~/.gradle
          key: ${{ runner.os }}-flet-android-${{ github.sha }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet

      # 关键：用 yes 命令自动确认所有交互提示
      - name: Build Android APK
        run: |
          yes | flet build apk --verbose --output build/Android

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: build/Android/

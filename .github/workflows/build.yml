name: Build Flet All Platforms
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runner: windows-latest
            build_cmd: flet build windows --name MyFletApp --no-console
            artifact_path: build/windows
            needs_linux_deps: false
          - name: linux
            runner: ubuntu-latest
            build_cmd: flet build linux --name MyFletApp
            artifact_path: build/linux
            needs_linux_deps: true
          - name: web
            runner: ubuntu-latest
            build_cmd: flet build web
            artifact_path: build/web
            needs_linux_deps: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.needs_linux_deps
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev ninja-build libblkid-dev liblzma-dev

      - name: Setup UV
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Flet Build
        run: ${{ matrix.build_cmd }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: ${{ matrix.artifact_path }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package files
        run: |
          zip -r Windows.zip windows-build
          tar -zcvf Linux.tar.gz linux-build
          zip -r Web.zip web-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Windows.zip
            Linux.tar.gz
            Web.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

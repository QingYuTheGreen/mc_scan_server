name: Build Flet All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1
  APP_NAME: mc_scan_server
  APP_DIR: .

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - name: windows
            runner: windows-latest
            build_cmd: flet build windows . --output build/windows -v --yes
            artifact_path: build/windows
            needs_linux_deps: false
            needs_android_deps: false
            needs_macos_deps: false
          
          # Linux
          - name: linux
            runner: ubuntu-latest
            build_cmd: flet build linux . --output build/linux -v --yes
            artifact_path: build/linux
            needs_linux_deps: true
            needs_android_deps: false
            needs_macos_deps: false
          
          # Android APK
          - name: android-apk
            runner: ubuntu-latest
            build_cmd: flet build apk . --output build/apk -v --yes
            artifact_path: build/apk
            needs_linux_deps: false
            needs_android_deps: true
            needs_macos_deps: false
          
          # macOS ARM64 (Apple Silicon)
          - name: macos-arm64
            runner: macos-latest
            build_cmd: flet build macos . --output build/macos -v --arch arm64 --yes
            artifact_path: build/macos
            needs_linux_deps: false
            needs_android_deps: false
            needs_macos_deps: true
          
          # macOS x86_64 (Intel)
          - name: macos-x86_64
            runner: macos-13
            build_cmd: flet build macos . --output build/macos -v --arch x86_64 --yes
            artifact_path: build/macos
            needs_linux_deps: false
            needs_android_deps: false
            needs_macos_deps: true
          
          # Web
          - name: web
            runner: ubuntu-latest
            build_cmd: flet build web . --output build/web -v --yes
            artifact_path: build/web
            needs_linux_deps: false
            needs_android_deps: false
            needs_macos_deps: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux build deps
        if: matrix.needs_linux_deps
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev ninja-build libblkid-dev liblzma-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav

      - name: Install Android build deps
        if: matrix.needs_android_deps
        run: |
          sudo apt update
          sudo apt install -y ninja-build openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install macOS build deps
        if: matrix.needs_macos_deps
        run: |
          brew update
          brew install ffmpeg ninja
          sudo gem install cocoapods

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Flet Build
        run: ${{ matrix.build_cmd }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: ${{ matrix.artifact_path }}
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package files
        run: |
          zip -r Windows.zip windows-build
          tar -zcvf Linux.tar.gz linux-build
          zip -r Android-APK.zip android-apk-build
          zip -r macOS-ARM64.zip macos-arm64-build
          zip -r macOS-x86_64.zip macos-x86_64-build
          zip -r Web.zip web-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Windows.zip
            Linux.tar.gz
            Android-APK.zip
            macOS-ARM64.zip
            macOS-x86_64.zip
            Web.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

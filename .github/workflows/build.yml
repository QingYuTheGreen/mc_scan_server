  #任务 2：我喜欢Android APK
  build-android:
    runs-on: ubuntu-latest
步骤:
      - 名字: 结账代码
用途: actions/checkout@v4

      - 名字: 安装Python
用途: actions/setup-python@v5
与:
          python-version: "3.11"

      - 名字: 安装依赖项
跑: |
运行 `python -m pip install --upgrade pip` 命令来升级 pip。
运行 `pip install -r requirements.txt` 命令。
安装flet造山机

      - 名字: 准备Buildozer配置
跑: |
#生成默认 buildozer. spec you
建筑用
          # 基础配置修改（可选，按需调整）
sed -i 's/title = .*/title = FletApp/' buildozer.spec
sed -i 's/package.name = .*/package.name = fletapp/' buildozer.spec
sed -i 's/package.domain = .*/package.domain = org.flet.app/' buildozer.spec

      - 名字: 构建发布APK
跑: |
android调试部署运行版本
          # 输出路径：bin/ 目录下就是 APK

      - 名字: 上传APK神器
用途: actions/upload-artifact@v4
与:
名字: Android-APK
路径: bin/
